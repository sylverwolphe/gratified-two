<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gratified - Rice & Beans Signup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .day-card {
            touch-action: manipulation;
        }
        @media (max-height: 700px) {
            #confirmModal > div {
                max-height: 90vh;
                overflow-y: auto;
            }
        }
    </style>
</head>
<body class="bg-stone-50 min-h-screen text-stone-900">
    <div class="max-w-2xl mx-auto px-6 py-12">
        <!-- Header -->
        <div class="mb-12 text-center">
            <h1 class="text-5xl font-light tracking-tight">gratified</h1>
            <p class="text-lg text-stone-600 mt-2">daily instapot lunch • served at 1pm</p>
            <p class="text-sm text-stone-500 mt-1">rice • beans • veg</p>
            <p class="text-base font-normal text-stone-800 mt-4">$4 bottomless</p>
        </div>

        <!-- Name Selection -->
        <div class="mb-10">
            <h2 class="text-xl font-normal mb-4">Your Name</h2>
            <select id="existingName" aria-label="Select existing name" class="w-full p-4 border border-stone-300 bg-white focus:outline-none focus:border-stone-800 mb-3">
                <option value="">Select existing name</option>
            </select>
            <input
                type="text"
                id="newName"
                placeholder="Or type new name..."
                aria-label="Enter new name"
                maxlength="50"
                class="w-full p-4 border border-stone-300 bg-white placeholder-stone-400 focus:outline-none focus:border-stone-800"
            />
            <div class="mt-4" id="plusContainer" style="display: none;">
                <label class="block text-sm text-stone-600 mb-2">+ companions / org seats (each $4/day)</label>
                <input type="number" id="plusOne" min="0" max="5" value="0" aria-label="Number of additional people" class="w-24 p-3 border border-stone-300 bg-white focus:outline-none focus:border-stone-800" />
            </div>
        </div>

        <!-- Day Selection + Signups -->
        <div class="mb-12">
            <h2 class="text-xl font-normal mb-4">Select Days ($4/person/day • all-you-can-eat)</h2>
            <div id="daysList" class="space-y-6"></div>
        </div>

        <!-- Submit Button -->
        <button
            id="submitBtn"
            style="display: none;"
            class="w-full bg-stone-900 text-white py-4 px-6 hover:bg-stone-800 transition-colors text-lg font-normal disabled:opacity-50 disabled:cursor-not-allowed"
        >
            Continue to Venmo
        </button>
    </div>

    <!-- Confirmation Modal -->
    <div id="confirmModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50" style="display: none;">
        <div class="bg-white p-8 max-w-md w-full rounded shadow-lg">
            <h3 class="text-2xl font-normal mb-6">Confirm & Pay</h3>
            
            <div class="mb-6 p-4 border border-stone-200 bg-stone-50">
                <div id="confirmSummary" class="font-normal mb-2"></div>
                <div id="confirmMeals" class="text-sm text-stone-600"></div>
            </div>

            <div class="mb-6">
                <div class="text-sm text-stone-600 mb-2">Pay via Venmo</div>
                <a
                    href="https://venmo.com/gratifiedwegrow?txn=pay&amount=0&note="
                    target="_blank"
                    id="venmoLink"
                    class="text-stone-900 hover:text-stone-700 font-normal underline text-lg"
                >
                    @gratifiedwegrow
                </a>
                <div class="text-xs text-stone-500 mt-2">Please include your name + date(s) in the note</div>
            </div>

            <div class="mb-6 p-4 border border-stone-200 bg-stone-50">
                <label class="flex items-start cursor-pointer">
                    <input type="checkbox" id="paymentCheckbox" class="mt-1 mr-3" aria-label="Confirm payment sent">
                    <span class="text-sm text-stone-700">
                        I confirm I have sent $<span id="totalAmount"></span> to @gratifiedwegrow 
                        with my name and dates in the note
                    </span>
                </label>
            </div>

            <div class="space-y-3">
                <button
                    id="confirmPaid"
                    disabled
                    class="w-full bg-stone-900 text-white py-4 px-6 hover:bg-stone-800 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                >
                    I've Sent the Payment
                </button>
                <button
                    id="cancelBtn"
                    class="w-full border border-stone-300 text-stone-900 py-4 px-6 hover:bg-stone-50 transition-colors"
                >
                    Cancel
                </button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getDatabase, ref, onValue, set, push } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAzNA4a611ePbI6BknQz-mlwOtAVBwSmbc",
            authDomain: "rice-beans.firebaseapp.com",
            databaseURL: "https://rice-beans-default-rtdb.firebaseio.com",
            projectId: "rice-beans",
            storageBucket: "rice-beans.firebasestorage.app",
            messagingSenderId: "451578694170",
            appId: "1:451578694170:web:debfefb12780121aa35fa3"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        // Sample daily veggie rotation (edit as needed)
        const menus = {
            Monday: { veggie: 'Broccoli', spice: 'garlic & cumin' },
            Tuesday: { veggie: 'Bell Peppers', spice: 'paprika & oregano' },
            Wednesday: { veggie: 'Carrots', spice: 'ginger & turmeric' },
            Thursday: { veggie: 'Eggplant', spice: 'basil & red pepper' },
            Friday: { veggie: 'Kale', spice: 'lemon & thyme' },
            Saturday: { veggie: 'Corn', spice: 'lime & chili' },
            Sunday: { veggie: 'Sweet Potato', spice: 'cinnamon & nutmeg' }
        };

        function generateDays() {
            const days = [];
            const today = new Date();
            today.setHours(0, 0, 0, 0); // Normalize to midnight
            
            for (let i = 0; i < 14; i++) {
                const date = new Date(today);
                date.setDate(today.getDate() + i);
                
                // Format as YYYY-MM-DD in local timezone
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                
                days.push({
                    date: `${year}-${month}-${day}`,
                    dayName: date.toLocaleDateString('en-US', { weekday: 'long' }),
                    dateStr: date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
                });
            }
            return days;
        }

        const days = generateDays();
        let allSignups = {};
        let selectedDays = [];
        let allNames = new Set();
        let isSubmitting = false;

        const signupsRef = ref(database, 'signups');
        onValue(signupsRef, (snapshot) => {
            allSignups = snapshot.val() || {};
            allNames.clear();
            Object.values(allSignups).forEach(day => {
                if (day) Object.values(day).forEach(s => allNames.add(s.name));
            });
            updateNameDropdown();
            renderDays();
        });

        function updateNameDropdown() {
            const select = document.getElementById('existingName');
            const val = select.value;
            select.innerHTML = '<option value="">Select existing name</option>';
            [...allNames].sort().forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                select.appendChild(opt);
            });
            if (val && allNames.has(val)) select.value = val;
        }

        function getCurrentName() {
            const newName = document.getElementById('newName').value.trim();
            const existingName = document.getElementById('existingName').value;
            const name = newName || existingName;
            
            if (name && (name.length > 50 || name.length < 2)) {
                return null;
            }
            return name;
        }

        function isAlreadySignedUp(date, name) {
            const daySignups = allSignups[date] || {};
            return Object.values(daySignups).some(s => s.name.toLowerCase() === name.toLowerCase());
        }

        function renderDays() {
            const container = document.getElementById('daysList');
            container.innerHTML = '';
            days.forEach(day => {
                const menu = menus[day.dayName] || { veggie: 'Surprise veggie', spice: 'house spices' };
                const isSelected = selectedDays.includes(day.date);
                const daySignups = allSignups[day.date] || {};
                const signupList = Object.values(daySignups);
                const totalPeople = signupList.reduce((sum, s) => sum + 1 + (s.plus || 0), 0);

                const dayDiv = document.createElement('div');
                dayDiv.className = `day-card p-6 border cursor-pointer transition-all ${isSelected ? 'border-stone-900 bg-stone-100' : 'border-stone-200 hover:border-stone-400 bg-white'}`;
                dayDiv.setAttribute('role', 'button');
                dayDiv.setAttribute('tabindex', '0');
                dayDiv.setAttribute('aria-label', `Sign up for ${day.dayName}, ${day.dateStr}. ${menu.veggie} with ${menu.spice}. ${totalPeople} people signed up.`);
                dayDiv.setAttribute('aria-pressed', isSelected);

                dayDiv.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <div class="text-lg font-normal">${day.dayName}, ${day.dateStr}</div>
                            <div class="text-sm text-stone-600 mt-1">${menu.veggie} • ${menu.spice}</div>
                        </div>
                        ${totalPeople > 0 ? `<div class="text-sm text-stone-500">${totalPeople} signed up</div>` : ''}
                    </div>

                    ${signupList.length > 0 ? `
                        <div class="mt-4 pt-4 border-t border-stone-200">
                            <div class="text-xs text-stone-500 mb-2 uppercase tracking-wide">Who's eating:</div>
                            <div class="space-y-1 text-sm text-stone-700">
                                ${signupList.map(s => `<div>${s.name}${s.plus > 0 ? ` +${s.plus}` : ''}</div>`).join('')}
                            </div>
                        </div>
                    ` : '<div class="text-sm text-stone-500 mt-2 italic">Be the first!</div>'}
                `;

                const handleToggle = () => {
                    const name = getCurrentName();
                    if (!name) {
                        alert('Please enter or select a name first (2-50 characters)');
                        return;
                    }
                    if (!isSelected && isAlreadySignedUp(day.date, name)) {
                        alert('You're already signed up for this day!');
                        return;
                    }
                    if (isSelected) {
                        selectedDays = selectedDays.filter(d => d !== day.date);
                    } else {
                        selectedDays.push(day.date);
                    }
                    renderDays();
                    updateSubmitButton();
                };

                dayDiv.addEventListener('click', handleToggle);
                dayDiv.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        handleToggle();
                    }
                });

                container.appendChild(dayDiv);
            });
        }

        function updateSubmitButton() {
            const btn = document.getElementById('submitBtn');
            const name = getCurrentName();
            btn.style.display = (selectedDays.length > 0 && name) ? 'block' : 'none';
        }

        function updatePlusVisibility() {
            document.getElementById('plusContainer').style.display = getCurrentName() ? 'block' : 'none';
        }

        // Events
        ['newName', 'existingName'].forEach(id => {
            document.getElementById(id).addEventListener(id === 'newName' ? 'input' : 'change', () => {
                if (id === 'newName') document.getElementById('existingName').value = '';
                if (id === 'existingName') document.getElementById('newName').value = '';
                updatePlusVisibility();
                updateSubmitButton();
            });
        });

        document.getElementById('submitBtn').addEventListener('click', () => {
            const name = getCurrentName();
            if (!name) {
                alert('Please enter a valid name (2-50 characters)');
                return;
            }
            
            const plus = parseInt(document.getElementById('plusOne').value) || 0;
            const totalPeople = (1 + plus);
            const totalDays = selectedDays.length;
            const amount = totalPeople * totalDays * 4;

            document.getElementById('confirmSummary').textContent = `${name}${plus > 0 ? ` +${plus} companion(s)` : ''}`;
            document.getElementById('confirmMeals').textContent = 
                `${totalPeople} person${totalPeople === 1 ? '' : 's'} × ${totalDays} day${totalDays === 1 ? '' : 's'} = $${amount} (all-you-can-eat)`;
            document.getElementById('totalAmount').textContent = amount;

            const note = encodeURIComponent(`${name}${plus > 0 ? ` +${plus}` : ''} - ${selectedDays.map(d => d.split('-').slice(1).join('/')).join(', ')}`);
            document.getElementById('venmoLink').href = `https://venmo.com/gratifiedwegrow?txn=pay&amount=${amount}&note=${note}`;

            document.getElementById('paymentCheckbox').checked = false;
            document.getElementById('confirmPaid').disabled = true;
            document.getElementById('confirmModal').style.display = 'flex';
        });

        // Close modal on backdrop click
        document.getElementById('confirmModal').addEventListener('click', (e) => {
            if (e.target.id === 'confirmModal') {
                document.getElementById('confirmModal').style.display = 'none';
            }
        });

        document.getElementById('cancelBtn').addEventListener('click', () => {
            document.getElementById('confirmModal').style.display = 'none';
        });

        // Enable confirm button only when checkbox is checked
        document.getElementById('paymentCheckbox').addEventListener('change', (e) => {
            document.getElementById('confirmPaid').disabled = !e.target.checked;
        });

        document.getElementById('confirmPaid').addEventListener('click', async () => {
            if (isSubmitting) return;
            
            const name = getCurrentName();
            const plus = parseInt(document.getElementById('plusOne').value) || 0;

            isSubmitting = true;
            const btn = document.getElementById('confirmPaid');
            const originalText = btn.textContent;
            btn.textContent = 'Submitting...';
            btn.disabled = true;

            try {
                for (const date of selectedDays) {
                    const dayRef = ref(database, `signups/${date}`);
                    const newRef = push(dayRef);
                    await set(newRef, {
                        name,
                        plus,
                        timestamp: Date.now()
                    });
                }

                // Reset form
                selectedDays = [];
                document.getElementById('newName').value = '';
                document.getElementById('existingName').value = '';
                document.getElementById('plusOne').value = 0;
                document.getElementById('confirmModal').style.display = 'none';
                document.getElementById('paymentCheckbox').checked = false;
                updatePlusVisibility();
                renderDays();
                updateSubmitButton();
                alert('Thanks! You're signed up — see you at 1pm!');
            } catch (error) {
                console.error('Signup failed:', error);
                alert('Oops! Something went wrong. Please try again or contact us if the problem persists.');
            } finally {
                isSubmitting = false;
                btn.textContent = originalText;
                btn.disabled = false;
            }
        });

        // Initial render
        renderDays();
        updateNameDropdown();
    </script>
</body>
</html>
